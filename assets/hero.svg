<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Oliver Chen, software engineer</title>
  <desc id="desc">A stylized terminal window introducing Oliver Chen and his focus on dependable systems and thoughtful automation.</desc>
  <defs>
    <linearGradient id="background" x1="84" y1="28" x2="1116" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#17113A"/>
    </linearGradient>
    <linearGradient id="accent" x1="118" y1="92" x2="940" y2="288" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55D6BE"/>
      <stop offset="0.52" stop-color="#7C8CFF"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 180) rotate(180) scale(420 320)">
      <stop stop-color="#7C3AED" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="20" y="10" width="1160" height="350" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="48" y="34" width="1104" height="292" rx="18"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <rect x="48" y="34" width="1104" height="292" rx="18" fill="url(#background)"/>
    <rect x="48.75" y="34.75" width="1102.5" height="290.5" rx="17.25" stroke="#6E7681" stroke-opacity="0.45" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#windowClip)">
    <rect x="48" y="34" width="1104" height="292" fill="url(#glow)"/>
    <path d="M48 82H1152" stroke="#30363D"/>
    <circle cx="78" cy="58" r="7" fill="#FF5F57"/>
    <circle cx="102" cy="58" r="7" fill="#FEBC2E"/>
    <circle cx="126" cy="58" r="7" fill="#28C840"/>
    <text x="600" y="63" text-anchor="middle" fill="#8B949E" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">oliver@github ~ profile</text>

    <text x="92" y="126" fill="#55D6BE" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">❯ whoami</text>
    <text x="92" y="184" fill="url(#accent)" font-size="46" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Oliver Chen / 陈昱舜</text>
    <text x="94" y="223" fill="#C9D1D9" font-size="21" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">software engineer · systems thinker · curious builder</text>
    <text x="92" y="274" fill="#55D6BE" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">❯ focus</text>
    <text x="200" y="274" fill="#E6EDF3" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">dependable systems + thoughtful automation</text>
    <rect x="684" y="258" width="10" height="21" rx="2" fill="#C084FC">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
